name: Update Fallback Repos

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [ mein ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos and update fallback
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repos } = await github.rest.repos.listForUser({
              username: 'meimakes',
              per_page: 100,
              sort: 'updated',
              type: 'owner'
            });

            const filtered = repos
              .filter(r => !r.fork && !r.name.endsWith('.github.io') && r.description)
              .map(r => ({
                name: r.name,
                description: r.description,
                language: r.language,
                stargazers_count: r.stargazers_count,
                forks_count: r.forks_count,
                html_url: r.html_url
              }));

            const fs = require('fs');
            let html = fs.readFileSync('index.html', 'utf8');

            const marker = /const FALLBACK = \[[\s\S]*?\];/;
            const replacement = 'const FALLBACK = ' + JSON.stringify(filtered, null, 4) + ';';

            if (!marker.test(html)) {
              core.setFailed('Could not find FALLBACK array in index.html');
              return;
            }

            html = html.replace(marker, replacement);
            fs.writeFileSync('index.html', html);
            core.info(`Updated FALLBACK with ${filtered.length} repos`);

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --quiet --staged && echo "No changes" || (git commit -m "Update fallback repos" && git push)
