    gap: 3px;
    width: 100%;
    height: 100vh;
    max-width: 1200px;
  }

  @media (max-width: 768px) {

      grid-template-rows: auto !important;
      grid-template-areas: none !important;
      height: auto !important;

    color: var(--tag-alt-color);

  .lang-tag--alt2 {

    color: var(--tag-alt-color2);

  .forks {

    font-size: 11px;

  .snowflake {

    opacity: 0;

    pointer-events: none;

    10% { opacity: var(--snowflake-opacity-peak); }
    90% { opacity: var(--snowflake-opacity-late); }
    100% { transform: translateY(200px) rotate(360deg); opacity: 0; }

    opacity: 0;
    animation: drift linear infinite;
    pointer-events: none;

    10% { opacity: 0.5; }
    90% { opacity: 0.3; }
    100% { transform: translateY(200px) translateX(30px) rotate(180deg); opacity: 0; }
  }
  .firefly {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--firefly-color);
    border-radius: 50%;
    opacity: 0;
    animation: glow ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow {
    0%, 100% { opacity: 0; transform: translate(0,0); }

    50% { opacity: 0.3; transform: translate(20px,-15px); }
    75% { opacity: 0.6; transform: translate(-10px,-30px); }

  .leaf {
    position: absolute;
    font-size: 11px;
    opacity: 0;
    animation: tumble linear infinite;
    pointer-events: none;

  @keyframes tumble {
    0% { transform: translateY(-10px) rotate(0); opacity: 0; }

  /* Clock */
  .clock-tile {
    background: var(--clock-bg);
    color: var(--clock-text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;

  .minute-grid {
    position: absolute;
    inset: 0;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 2px;
    padding: 6px;
    pointer-events: none;

  .minute-sq {
    width: 9px;
    height: 9px;
    border-radius: 1px;
    background: var(--minute-sq-bg);
    opacity: var(--minute-sq-opacity);

  .minute-sq.active { opacity: var(--minute-sq-active); }

  .clock-time {
    font-weight: 400;
    letter-spacing: 2px;

  .links-tile {

    font-size: 12px;
    letter-spacing: 1px;
    opacity: var(--link-opacity);
    color: var(--link-color);
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>

    let meta = lang ? '<span class="' + tagCls + '">' + lang + '</span>' : '';
    if (repo.stargazers_count > 0) meta += '<span class="stars">\u2605 ' + repo.stargazers_count + '</span>';
    if (repo.forks_count > 0) meta += '<span class="forks">' + FORK_SVG + ' ' + repo.forks_count + '</span>';

    const div = document.createElement('div');
    div.id = id;
    div.className = 'card ' + color;
    div.innerHTML = '<a href="' + repo.html_url + '" target="_blank" style="display:flex;flex-direction:column;justify-content:space-between;height:100%">' +
      '<div><div class="card-title">' + repo.name + '</div>' +
      '<div class="card-desc">' + (repo.description || '') + '</div></div>' +
      '<div class="card-meta">' + meta + '</div></a>';
    return { id, el: div };
  }

  async function fetchRepos() {
    try {
      const resp = await fetch('https://api.github.com/users/' + GITHUB_USER + '/repos?per_page=100&sort=updated');
      if (!resp.ok) throw new Error(resp.status);
      const repos = await resp.json();
      // Filter out .github.io (this site) and forks
      return repos.filter(r => !r.fork && !r.name.endsWith('.github.io') && r.description);
    } catch(e) {
      return null;
    }
  }

  function renderProjects(repos) {
    const grid = document.getElementById('grid');
    const container = document.getElementById('project-container');
    const picked = shuffle(repos).slice(0, CARD_COUNT);

    picked.forEach((repo, i) => {
      const { id, el } = buildCard(repo, i);
      projIds.push(id);
      grid.insertBefore(el, container);
    });
    container.remove();
  }

  function findSpans(areas) {
    const spans = new Set();
    for (const row of areas) {
      const cells = row.split(' ').filter(x => x !== 'avatar');
      for (let i = 0; i < cells.length - 1; i++) {
        if (cells[i] === cells[i + 1]) spans.add(cells[i]);
      }
    }
    return spans;
  }

  function isMobile() { return window.innerWidth <= 768; }

  function applyLayout() {
    if (isMobile()) {
      // On mobile: shuffle DOM order instead of grid-area
      const g = document.getElementById('grid');
      const avatar = document.getElementById('avatar-cell');
      const allBlocks = shuffle([...utilIds, ...projIds]);
      // Avatar stays first, then shuffled blocks
      allBlocks.forEach(id => {
        const el = document.getElementById(id);
        if (el) g.appendChild(el);
      });
      return;
    }

    const L = layouts[Math.random() * layouts.length | 0];
    const g = document.getElementById('grid');
    g.style.gridTemplateColumns = L.cols;
    g.style.gridTemplateRows = L.rows;
    g.style.gridTemplateAreas = L.areas.map(r => "'" + r + "'").join(' ');
    document.getElementById('avatar-cell').style.gridArea = 'avatar';

    const spans = findSpans(L.areas);
    const spanSlots = [];
    const singleSlots = [];
    slotNames.forEach(s => { if (spans.has(s)) spanSlots.push(s); else singleSlots.push(s); });

    const su = shuffle(utilIds);
    const sp = shuffle(projIds);
    const assignments = {};

    // Utility blocks get span-2 slots
    spanSlots.forEach((slot, i) => { if (i < su.length) assignments[su[i]] = slot; });

    // Remaining blocks fill single slots
    const remaining = shuffle([...su.filter(id => !assignments[id]), ...sp]);
    const availSlots = shuffle(singleSlots);
    remaining.forEach((id, i) => { assignments[id] = availSlots[i]; });

    Object.entries(assignments).forEach(([id, slot]) => {
      document.getElementById(id).style.gridArea = slot;
    });
  }

  // Minute grid for clock
  function buildMinuteGrid() {
    const grid = document.getElementById('minute-grid');
    const now = new Date();
    const totalMins = now.getHours() * 60 + now.getMinutes();
    const filled = Math.floor(totalMins / 10);
    if (grid.dataset.last === String(filled)) return;
    grid.dataset.last = String(filled);
    grid.innerHTML = '';
    for (let i = 0; i < 144; i++) {
      const sq = document.createElement('div');
      sq.className = 'minute-sq' + (i < filled ? ' active' : '') + (i === filled ? ' current' : '');
      grid.appendChild(sq);
    }
  }

  // Season particle effects
  function seasonEffects(si) {
    const tile = document.getElementById('b-season');
    if (tile.dataset.fx) return;
    tile.dataset.fx = '1';

    if (si === 0) {
      // Winter: snowflakes
      for (let i = 0; i < 15; i++) {
        const s = document.createElement('div');
        s.className = 'snowflake';
        s.textContent = '\u2022';
        s.style.left = Math.random() * 100 + '%';
        s.style.animationDuration = (2 + Math.random() * 3) + 's';
        s.style.animationDelay = Math.random() * 4 + 's';
        s.style.fontSize = (6 + Math.random() * 8) + 'px';
        tile.appendChild(s);
      }
    } else if (si === 1) {
      // Spring: petals
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = '\u273f';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (3 + Math.random() * 4) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        tile.appendChild(p);
      }
    } else if (si === 2) {
      // Summer: fireflies
      for (let i = 0; i < 6; i++) {
        const f = document.createElement('div');
        f.className = 'firefly';
        f.style.left = (10 + Math.random() * 80) + '%';
        f.style.top = (10 + Math.random() * 80) + '%';
        f.style.animationDuration = (2 + Math.random() * 3) + 's';
        f.style.animationDelay = Math.random() * 3 + 's';
        tile.appendChild(f);
      }
    } else {
      // Autumn: leaves
      for (let i = 0; i < 8; i++) {
        const l = document.createElement('div');
        l.className = 'leaf';
        l.textContent = ['\ud83c\udf42', '\ud83c\udf41'][i % 2];
        l.style.left = Math.random() * 100 + '%';
        l.style.animationDuration = (3 + Math.random() * 3) + 's';
        l.style.animationDelay = Math.random() * 4 + 's';
        tile.appendChild(l);
      }
    }
  }

  // Clock and greeting updates
  function updateClock() {
    const now = new Date();
    const h = now.getHours() % 12 || 12;
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m + ' ' + (now.getHours() >= 12 ? 'pm' : 'am');

    const month = now.getMonth();
    const seasons = ['winter', 'spring', 'summer', 'autumn'];
    const si = month < 2 ? 0 : month < 5 ? 1 : month < 8 ? 2 : month < 11 ? 3 : 0;
    document.getElementById('season').textContent = seasons[si];
    document.getElementById('year').textContent = now.getFullYear();

    const hr = now.getHours();
    document.getElementById('moon').style.display = (hr >= 19 || hr < 6) ? 'block' : 'none';

    let en, jp;
    if (hr >= 5 && hr < 12) { en = 'good morning'; jp = '\u304a\u306f\u3088\u3046'; }
    else if (hr >= 12 && hr < 17) { en = 'good afternoon'; jp = '\u3053\u3093\u306b\u3061\u306f'; }
    else if (hr >= 17 && hr < 21) { en = 'good evening'; jp = '\u3053\u3093\u3070\u3093\u306f'; }
    else { en = 'good night'; jp = '\u304a\u3084\u3059\u307f'; }

    document.getElementById('greeting-en').textContent = en;
    document.getElementById('greeting-jp').textContent = jp;

    const isSun = hr >= 6 && hr < 18;
    document.getElementById('sun-mark').style.display = isSun ? 'block' : 'none';
    document.getElementById('moon-mark').style.display = isSun ? 'none' : 'block';

    seasonEffects(si);
    buildMinuteGrid();
  }

  // Init
  async function init() {
    const repos = await fetchRepos();
    renderProjects(repos || FALLBACK);
    applyLayout();
    updateClock();
    setInterval(updateClock, 1000);
  }
  init();
})();
</script>
