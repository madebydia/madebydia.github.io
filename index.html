<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meimakes</title>
<meta name="description" content="Things made by Mei Park. Tools, family projects, and MCP servers.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://meimakes.com/">
<meta property="og:title" content="meimakes">
<meta property="og:description" content="Things made by Mei Park. Tools, family projects, and MCP servers.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@meimakes">
<link rel="canonical" href="https://meimakes.com/">
<style>
:root {
  /* Catppuccin Mocha */
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --lavender: #b4befe;
  --blue: #89b4fa;
  --sapphire: #74c7ec;
  --sky: #89dceb;
  --teal: #94e2d5;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --peach: #fab387;
  --maroon: #eba0ac;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --pink: #f5c2e7;
  --flamingo: #f2cdcd;
  --rosewater: #f5e0dc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--crust);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Window chrome */
.window {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 40px);
  max-height: 100vh;
  width: 100%;
  max-width: 900px;
  margin: 20px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--surface1);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  background: var(--base);
}
.titlebar {
  background: var(--mantle);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--surface0);
  border-radius: 12px 12px 0 0;
}
.dots { display: flex; gap: 6px; }
.dot {
  width: 12px; height: 12px; border-radius: 50%;
}
.dot.red { background: #ed6a5e; }
.dot.yellow { background: #f4bf4f; }
.dot.green { background: #61c554; }
.titlebar-text {
  flex: 1; text-align: center;
  color: var(--overlay1); font-size: 12px;
}

/* Terminal body */
.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scroll-behavior: smooth;
}
.terminal::-webkit-scrollbar { width: 8px; }
.terminal::-webkit-scrollbar-track { background: var(--mantle); }
.terminal::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 4px; }

/* Lines */
.line { white-space: pre-wrap; word-break: break-word; }
.prompt-symbol { color: var(--green); }
.cmd-text { color: var(--text); }
.comment { color: var(--overlay0); }
.dir { color: var(--blue); font-weight: 600; cursor: pointer; }
.dir:hover { text-decoration: underline; }
.file { color: var(--text); }
.link { color: var(--sapphire); cursor: pointer; }
.link:hover { text-decoration: underline; }
.accent { color: var(--mauve); }
.heading { color: var(--yellow); font-weight: 600; }
.desc { color: var(--subtext0); }
.error { color: var(--red); }
.muted { color: var(--overlay0); }
.success { color: var(--green); }

/* Project listing */
.project-row {
  display: flex;
  gap: 8px;
  padding: 2px 0;
  cursor: pointer;
  border-radius: 4px;
  padding-left: 24px;
}
.project-row:hover {
  background: var(--surface0);
}
.project-name {
  color: var(--blue);
  font-weight: 600;
  min-width: 200px;
  flex-shrink: 0;
}
.project-desc {
  color: var(--subtext0);
}
.category-header {
  color: var(--yellow);
  margin-top: 8px;
  margin-bottom: 2px;
}
.category-header:first-child { margin-top: 0; }

/* Input line */
.input-line {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 4px;
}
.input-line .prompt-symbol { flex-shrink: 0; }
#cmd-input {
  background: none;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  outline: none;
  flex: 1;
  caret-color: var(--green);
  padding: 0;
  margin-left: 0;
}

/* Typing animation for auto-run */
.typing-cursor {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: var(--green);
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 1px;
}
@keyframes blink {
  50% { opacity: 0; }
}

/* Bio section */
.bio-line { padding: 1px 0; }
.bio-separator { color: var(--surface2); }

/* Responsive */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .window { margin: 0; height: 100vh; border-radius: 0; border: none; }
  .titlebar { border-radius: 0; }
  .terminal { padding: 12px; }
  .line { padding: 2px 0; }
  .project-name { min-width: 140px; }
  .project-row { padding: 6px 0 6px 16px; }
  .titlebar-text { font-size: 12px; }
}
@media (max-width: 400px) {
  .project-name { min-width: 120px; }
  .project-desc { display: none; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="titlebar-text">mei@meimakes: ~</div>
    <div style="width: 54px;"></div>
  </div>
  <div class="terminal" id="terminal">
    <div id="output"></div>
    <div class="input-line" id="input-line" style="display:none;">
      <span class="prompt-symbol">❯&nbsp;</span><input id="cmd-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" autofocus>
    </div>
  </div>
</div>

<script>
const PROJECTS = {
  tools: [
    { name: 'codesnap', desc: 'Pretty code screenshots from your terminal', url: 'https://github.com/meimakes/codesnap' },
    { name: 'chomp', desc: 'Local food database CLI for nutrition tracking', url: 'https://github.com/meimakes/chomp' },
    { name: 'napstack', desc: 'Productivity dashboard for naptime code sessions', url: 'https://github.com/meimakes/napstack-dev' },
  ],
  family: [
    { name: 'toddler-activity-finder', desc: '100+ curated activities for toddlers', url: 'https://github.com/meimakes/toddler-activity-finder' },
    { name: 'raisingpixels', desc: 'Resources for raising digital natives', url: 'https://raisingpixels.dev' },
    { name: 'madladstudios', desc: 'Games built by a 3-year-old and his mom', url: 'https://madladstudios.com' },
  ],
  agents: [
    { name: 'amazon-mcp-server', desc: 'Amazon cart MCP server', url: 'https://github.com/meimakes/amazon-mcp-server' },
    { name: 'apple-mcp-server', desc: 'Apple Reminders MCP server', url: 'https://github.com/meimakes/apple-mcp-server' },
    { name: 'oura-mcp-server', desc: 'Oura Ring MCP server', url: 'https://github.com/meimakes/oura-mcp-server' },
    { name: 'hevy-mcp-server', desc: 'Hevy workout app MCP server', url: 'https://github.com/meimakes/hevy-mcp-server' },
    { name: 'strava-mcp-server', desc: 'Strava MCP server', url: 'https://github.com/meimakes/strava-mcp-server' },
  ],
};

const ALL_PROJECTS = Object.values(PROJECTS).flat();
const PROJECT_NAMES = ALL_PROJECTS.map(p => p.name);

const BIO = [
  { text: '# about.md', cls: 'heading' },
  { text: '', cls: '' },
  { text: 'Mei Park', cls: 'accent' },
  { text: 'SAHM. Ceaseless builder. Formerly SWE director,', cls: 'file' },
  { text: 'now full-time maker of things that needed to exist.', cls: 'file' },
  { text: '', cls: '' },
  { text: 'I build tools for my family, then share them.', cls: 'file' },
  { text: 'MCP servers for AI agents. CLI tools for AI and devs.', cls: 'file' },
  { text: 'Educational apps for my 3-year-old.', cls: 'file' },
  { text: '', cls: '' },
  { text: 'Follow along:', cls: 'file' },
  { text: '  github    github.com/meimakes', cls: 'link', url: 'https://github.com/meimakes' },
  { text: '  𝕏         x.com/meimakes', cls: 'link', url: 'https://x.com/meimakes' },
];

const COMMANDS = {
  help: () => [
    { text: 'Available commands:', cls: 'heading' },
    { text: '', cls: '' },
    { text: '  ls                List all projects', cls: 'file' },
    { text: '  cat about.md      About me', cls: 'file' },
    { text: '  cd &lt;project&gt;      Open a project', cls: 'file' },
    { text: '  open &lt;project&gt;    Open a project', cls: 'file' },
    { text: '  man &lt;project&gt;     Project details', cls: 'file' },
    { text: '  clear             Clear terminal', cls: 'file' },
    { text: '  help              Show this message', cls: 'file' },
    { text: '', cls: '' },
    { text: 'Tip: click any project name to open it', cls: 'muted' },
  ],
  ls: () => {
    const lines = [];
    for (const [category, projects] of Object.entries(PROJECTS)) {
      lines.push({ text: `${category}/`, cls: 'category-header' });
      for (const p of projects) {
        lines.push({ type: 'project', name: p.name, desc: p.desc, url: p.url });
      }
    }
    return lines;
  },
  cat: (args) => {
    if (!args || args === 'about.md' || args === 'README.md' || args === 'readme.md') {
      return BIO;
    }
    return [{ text: `cat: ${args}: No such file or directory`, cls: 'error' }];
  },
  cd: (args) => {
    const project = findProject(args);
    if (project) {
      setTimeout(() => navigateTo(project.url), 300);
      return [{ text: `→ Opening ${project.name}...`, cls: 'success' }];
    }
    return [{ text: `cd: no such directory: ${args || ''}`, cls: 'error' }];
  },
  open: (args) => COMMANDS.cd(args),
  man: (args) => {
    const project = findProject(args);
    if (project) {
      return [
        { text: `${project.name.toUpperCase()}(1)`, cls: 'heading' },
        { text: '', cls: '' },
        { text: 'NAME', cls: 'accent' },
        { text: `  ${project.name} - ${project.desc}`, cls: 'file' },
        { text: '', cls: '' },
        { text: 'URL', cls: 'accent' },
        { text: `  ${project.url.startsWith('http') ? project.url : 'https://meimakes.com' + project.url}`, cls: 'link', url: project.url },
        { text: '', cls: '' },
        { text: 'SOURCE', cls: 'accent' },
        { text: `  https://github.com/meimakes/${project.name}`, cls: 'link', url: `https://github.com/meimakes/${project.name}` },
      ];
    }
    return [{ text: `No manual entry for ${args || ''}`, cls: 'error' }];
  },
  clear: () => {
    document.getElementById('output').innerHTML = '';
    return [];
  },
  pwd: () => [{ text: '/home/meimakes', cls: 'file' }],
  whoami: () => [{ text: 'a visitor with mass taste', cls: 'file' }],
  echo: (args) => [{ text: args || '', cls: 'file' }],
  neofetch: () => [
    { text: '        ╱╲', cls: 'accent' },
    { text: '       ╱  ╲       meimakes', cls: 'accent' },
    { text: '      ╱    ╲      ─────────', cls: 'accent' },
    { text: '     ╱  ╱╲  ╲     Projects: ' + ALL_PROJECTS.length, cls: 'accent' },
    { text: '    ╱  ╱  ╲  ╲    MCP Servers: ' + PROJECTS.agents.length, cls: 'accent' },
    { text: '   ╱  ╱    ╲  ╲   Tools: ' + PROJECTS.tools.length, cls: 'accent' },
    { text: '  ╱──╱──────╲──╲  Shell: zsh', cls: 'accent' },
    { text: ' ╱──────────────╲ Theme: Catppuccin Mocha', cls: 'accent' },
  ],
  exit: () => {
    setTimeout(() => window.location.href = 'https://github.com/meimakes', 500);
    return [{ text: 'logout', cls: 'muted' }];
  },
  sudo: () => [{ text: 'nice try', cls: 'error' }],
  rm: () => [{ text: 'absolutely not', cls: 'error' }],
  vim: () => [{ text: "you can check out any time you like, but you can never leave", cls: 'muted' }],
  ssh: (args) => {
    if (args === 'mei') {
      return [
        { text: 'Connecting to mei...', cls: 'success' },
        { text: '', cls: '' },
        { text: "Chat coming soon. For now, find me on 𝕏:", cls: 'file' },
        { text: '  x.com/meimakes', cls: 'link', url: 'https://x.com/meimakes' },
      ];
    }
    return [{ text: `ssh: Could not resolve hostname ${args || ''}: nodename nor servname provided`, cls: 'error' }];
  },
};

function findProject(name) {
  if (!name) return null;
  name = name.toLowerCase().trim().replace(/\/$/, '');
  // Try exact match first
  let match = ALL_PROJECTS.find(p => p.name.toLowerCase() === name);
  if (match) return match;
  // Try with category prefix stripped (e.g. tools/codesnap)
  const parts = name.split('/');
  if (parts.length === 2) {
    match = ALL_PROJECTS.find(p => p.name.toLowerCase() === parts[1].replace(/\/$/, ''));
  }
  // Try partial match
  if (!match) {
    match = ALL_PROJECTS.find(p => p.name.toLowerCase().startsWith(name));
  }
  return match || null;
}

function navigateTo(url) {
  if (url.startsWith('http')) {
    window.open(url, '_blank');
  } else {
    window.location.href = url;
  }
}

const output = document.getElementById('output');
const terminal = document.getElementById('terminal');
const inputLine = document.getElementById('input-line');
const cmdInput = document.getElementById('cmd-input');

function renderLines(lines) {
  for (const line of lines) {
    if (line.type === 'project') {
      const row = document.createElement('div');
      row.className = 'project-row';
      row.innerHTML = `<span class="project-name">${line.name}</span><span class="project-desc">${line.desc}</span>`;
      row.addEventListener('click', () => navigateTo(line.url));
      output.appendChild(row);
    } else {
      const div = document.createElement('div');
      div.className = 'line';
      if (line.url) {
        div.innerHTML = `<span class="${line.cls}">${line.text}</span>`;
        div.style.cursor = 'pointer';
        div.addEventListener('click', () => navigateTo(line.url));
      } else {
        div.innerHTML = line.text === '' ? '&nbsp;' : `<span class="${line.cls}">${line.text}</span>`;
      }
      output.appendChild(div);
    }
  }
  scrollToBottom();
}

function addPromptLine(text) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = `<span class="prompt-symbol">❯ </span><span class="cmd-text">${text}</span>`;
  output.appendChild(div);
}

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function handleCommand(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  addPromptLine(escapeHtml(trimmed));

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');

  // Handle rm with any flags
  if (cmd === 'rm') {
    renderLines(COMMANDS.rm());
    return;
  }
  if (cmd === 'sudo') {
    renderLines(COMMANDS.sudo());
    return;
  }

  if (COMMANDS[cmd]) {
    const result = COMMANDS[cmd](args);
    renderLines(result);
  } else {
    renderLines([
      { text: `zsh: command not found: ${escapeHtml(cmd)}`, cls: 'error' },
      { text: "Type 'help' for available commands", cls: 'muted' },
    ]);
  }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Completable tokens
const FILES = ['about.md', 'README.md'];
const ALL_COMPLETIONS = PROJECT_NAMES.concat(FILES);

// Command history
const history = [];
let historyIdx = -1;

// Single consolidated input handler
cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const val = cmdInput.value;
    const parts = val.split(/\s+/);
    if (parts.length >= 2) {
      const partial = parts[parts.length - 1].toLowerCase();
      const match = ALL_COMPLETIONS.find(n => n.toLowerCase().startsWith(partial));
      if (match) {
        parts[parts.length - 1] = match;
        cmdInput.value = parts.join(' ');
      }
    }
    return;
  }
  if (e.key === 'Enter') {
    const val = cmdInput.value;
    if (val.trim()) {
      history.push(val.trim());
      historyIdx = -1;
    }
    cmdInput.value = '';
    handleCommand(val);
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length > 0 && historyIdx < history.length - 1) {
      historyIdx++;
      cmdInput.value = history[history.length - 1 - historyIdx];
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      cmdInput.value = history[history.length - 1 - historyIdx];
    } else {
      historyIdx = -1;
      cmdInput.value = '';
    }
    return;
  }
});

// Click terminal to focus input
terminal.addEventListener('click', (e) => {
  if (!e.target.closest('.project-row') && !e.target.closest('[style*="cursor: pointer"]') && !e.target.closest('.link')) {
    cmdInput.focus();
  }
});

// Auto-run intro sequence
async function intro() {
  await typeCommand('cat about.md');
  renderLines(BIO);
  await pause(600);
  renderLines([{ text: '', cls: '' }]);
  await typeCommand('ls projects');
  renderLines(COMMANDS.ls());
  await pause(400);

  // Show input
  inputLine.style.display = 'flex';
  cmdInput.focus();
  scrollToBottom();
}

async function typeCommand(text) {
  const div = document.createElement('div');
  div.className = 'line';
  const prompt = document.createElement('span');
  prompt.className = 'prompt-symbol';
  prompt.textContent = '❯ ';
  div.appendChild(prompt);
  const cmdSpan = document.createElement('span');
  cmdSpan.className = 'cmd-text';
  div.appendChild(cmdSpan);
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  div.appendChild(cursor);
  output.appendChild(div);
  scrollToBottom();

  for (let i = 0; i < text.length; i++) {
    cmdSpan.textContent += text[i];
    scrollToBottom();
    await pause(40 + Math.random() * 30);
  }
  cursor.remove();
  await pause(300);
}

function pause(ms) {
  return new Promise(r => setTimeout(r, ms));
}

intro();
</script>
</body>
</html>
